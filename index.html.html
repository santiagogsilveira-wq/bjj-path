<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BJJ PATH — Sistema de Progressão</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap');

:root {
  --bg: #060608;
  --bg1: #0e0e14;
  --bg2: #14141c;
  --bg3: #1c1c28;
  --bg4: #222230;
  --border: #1e1e2e;
  --border2: #2c2c42;
  --text: #ececf4;
  --text-dim: #8888aa;
  --text-muted: #44445a;
  --blue: #4070ff;
  --blue-d: rgba(64,112,255,0.18);
  --blue-g: rgba(64,112,255,0.35);
  --orange: #ff6020;
  --orange-d: rgba(255,96,32,0.15);
  --green: #00cc7a;
  --green-d: rgba(0,204,122,0.12);
  --red: #ff3355;
  --red-d: rgba(255,51,85,0.12);
  --gold: #ffbe00;
  --gold-d: rgba(255,190,0,0.12);
  --purple: #b060ff;
  --purple-d: rgba(176,96,255,0.12);
  --cyan: #00c8e0;
  --cyan-d: rgba(0,200,224,0.12);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* HEADER */
#hdr{padding:20px 16px 0;max-width:780px;margin:0 auto}
#hdr h1{font-family:'Syne',sans-serif;font-size:clamp(24px,6vw,38px);font-weight:800;letter-spacing:-1px;
  background:linear-gradient(120deg,#fff 0%,var(--blue) 55%,var(--purple) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
#hdr p{color:var(--text-dim);font-size:12px;margin-top:5px;line-height:1.5}
.hdr-pills{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border2);
  border-radius:20px;padding:4px 12px;font-size:11px;font-family:'Space Mono',monospace;white-space:nowrap}
.pill-dot{width:6px;height:6px;border-radius:50%}

/* OVERALL PROGRESS */
#ovr{max-width:780px;margin:14px auto 0;padding:0 16px}
.ovr-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
.ovr-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--blue),var(--purple),var(--orange))}
.ovr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ovr-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);font-weight:600}
.ovr-pct{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--blue)}
.ovr-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:10px}
.ovr-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .7s ease}
.ovr-nodes{display:flex;gap:3px}
.ovr-node{flex:1;height:3px;border-radius:2px;background:var(--bg3);transition:background .3s}
.ovr-node.done{background:var(--green)}.ovr-node.active{background:var(--blue)}.ovr-node.locked{background:var(--bg3)}

/* FOCUS CARD */
#focus-card{max-width:780px;margin:10px auto 0;padding:0 16px}
.fc-inner{background:linear-gradient(135deg,rgba(64,112,255,0.12),rgba(176,96,255,0.08));
  border:1px solid var(--blue);border-radius:10px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.fc-icon{font-size:24px;flex-shrink:0;margin-top:2px}
.fc-body{}
.fc-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);font-weight:700;margin-bottom:3px}
.fc-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.fc-sub{font-size:12px;color:var(--text-dim);margin-top:3px}

/* PATH */
#path{max-width:780px;margin:16px auto 0;padding:0 16px 80px;display:flex;flex-direction:column;gap:0}

/* NODE */
.node{position:relative;animation:fadeUp .35s ease both}
.node:nth-child(1){animation-delay:.04s}.node:nth-child(2){animation-delay:.08s}
.node:nth-child(3){animation-delay:.12s}.node:nth-child(4){animation-delay:.16s}
.node:nth-child(5){animation-delay:.2s}.node:nth-child(6){animation-delay:.24s}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.node:not(:last-child)::after{content:'';position:absolute;left:27px;bottom:-20px;
  width:2px;height:20px;background:var(--border);z-index:0}
.node.done-node:not(:last-child)::after{background:var(--green)}
.node.active-node:not(:last-child)::after{background:var(--blue)}

.nwrap{display:flex;gap:11px;align-items:flex-start;padding:10px 0}

.nicon{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:18px;border:2px solid;z-index:1;position:relative;transition:all .3s}
.nicon.locked{background:var(--bg2);border-color:var(--border);filter:grayscale(1);opacity:.4}
.nicon.active{background:var(--blue-d);border-color:var(--blue);box-shadow:0 0 16px var(--blue-g)}
.nicon.done{background:var(--green-d);border-color:var(--green)}
.nicon.mastered{background:var(--gold-d);border-color:var(--gold)}

.ncard{flex:1;background:var(--bg1);border:1px solid var(--border);border-radius:11px;overflow:hidden;transition:all .3s}
.ncard.locked{opacity:.38;pointer-events:none}
.ncard.active{border-color:var(--blue)}
.ncard.done{border-color:var(--green)}
.ncard.mastered{border-color:var(--gold)}

.nhdr{padding:13px 14px;cursor:pointer;user-select:none;display:flex;justify-content:space-between;
  align-items:center;transition:background .2s;-webkit-user-select:none}
.nhdr:hover,.nhdr:active{background:var(--bg2)}
.nhl{flex:1;min-width:0}
.nstep{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1px;margin-bottom:2px}
.nname{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ncard.locked .nname{color:var(--text-muted)}
.ntags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;border:1px solid;white-space:nowrap}
.tag-pos{border-color:var(--blue);color:var(--blue);background:var(--blue-d)}
.tag-back{border-color:var(--orange);color:var(--orange);background:var(--orange-d)}
.tag-fin{border-color:var(--red);color:var(--red);background:var(--red-d)}
.tag-sys{border-color:var(--purple);color:var(--purple);background:var(--purple-d)}
.tag-sweep{border-color:var(--green);color:var(--green);background:var(--green-d)}
.tag-key{border-color:var(--gold);color:var(--gold);background:var(--gold-d)}

.nhr{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:8px}
.nsbadge{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:2px 7px;
  border-radius:3px;letter-spacing:.5px;white-space:nowrap}
.nsb-locked{background:var(--bg3);color:var(--text-muted)}
.nsb-active{background:var(--blue-d);color:var(--blue);border:1px solid var(--blue)}
.nsb-done{background:var(--green-d);color:var(--green);border:1px solid var(--green)}
.nsb-mastered{background:var(--gold-d);color:var(--gold);border:1px solid var(--gold)}
.ndots{display:flex;gap:2px}
.ndot{width:7px;height:7px;border-radius:50%;background:var(--bg3)}
.ndot.f{background:var(--blue)}.ndot.g{background:var(--green)}

/* BODY */
.nbody{display:none;border-top:1px solid var(--border)}
.nbody.open{display:block}

/* TABS */
.ntabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border);
  scrollbar-width:none}-webkit-scrollbar{display:none}
.ntab{flex-shrink:0;padding:10px 14px;cursor:pointer;font-size:11px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);
  border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;user-select:none;-webkit-user-select:none}
.ntab:hover{color:var(--text-dim)}.ntab.active{color:var(--blue);border-bottom-color:var(--blue)}

.ntc{display:none;padding:16px 14px}.ntc.active{display:block}

/* GUIDE */
.g-context{background:linear-gradient(135deg,var(--blue-d),rgba(176,96,255,.08));
  border:1px solid var(--blue);border-radius:8px;padding:13px 14px;margin-bottom:14px;font-size:13px;
  color:var(--text-dim);line-height:1.8}
.g-context strong{color:var(--blue);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:5px}

.sec-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-muted);margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

.gstep{display:flex;gap:10px;margin-bottom:8px;background:var(--bg2);border:1px solid var(--border);
  border-radius:7px;padding:10px 12px}
.gstep-n{font-family:'Space Mono',monospace;font-size:10px;color:var(--blue);font-weight:700;
  min-width:20px;flex-shrink:0;padding-top:1px}
.gstep-t{font-size:13px;color:var(--text-dim);line-height:1.65}
.gstep-t strong{color:var(--text)}
.gstep-t em{color:var(--gold);font-style:normal}
.gstep-t .warn{color:var(--red)}
.gstep-t .ok{color:var(--green)}

.detail-box{border-radius:7px;padding:11px 13px;margin-bottom:8px;font-size:13px;line-height:1.7;border:1px solid}
.db-blue{background:var(--blue-d);border-color:var(--blue);color:var(--text-dim)}
.db-green{background:var(--green-d);border-color:var(--green);color:var(--text-dim)}
.db-red{background:var(--red-d);border-color:var(--red);color:var(--text-dim)}
.db-gold{background:var(--gold-d);border-color:var(--gold);color:var(--text-dim)}
.db-orange{background:var(--orange-d);border-color:var(--orange);color:var(--text-dim)}
.db-purple{background:var(--purple-d);border-color:var(--purple);color:var(--text-dim)}
.db-cyan{background:var(--cyan-d);border-color:var(--cyan);color:var(--text-dim)}
.detail-box strong{color:var(--text);font-size:10px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px}

.ifthen{background:var(--bg2);border:1px solid var(--border);border-radius:7px;
  padding:9px 12px;margin-bottom:6px}
.it-if{font-size:10px;font-family:'Space Mono',monospace;color:var(--text-muted);margin-bottom:3px}
.it-if span{color:var(--blue)}
.it-then{font-size:13px;color:var(--text-dim)}
.it-then span{color:var(--orange);font-weight:600}
.it-then .back-highlight{color:var(--red);font-weight:700}

.yt-link{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);
  border-radius:7px;padding:10px 12px;margin-bottom:6px;text-decoration:none;color:var(--text-dim);
  font-size:12px;transition:all .2s;cursor:pointer}
.yt-link:hover{border-color:var(--red);color:var(--text)}
.yt-icon{font-size:18px;flex-shrink:0}
.yt-body{flex:1}
.yt-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:1px}
.yt-sub{font-size:10px;color:var(--text-muted)}

/* TRAINING PLAN */
.train-day{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.td-header{background:var(--bg3);padding:9px 13px;display:flex;justify-content:space-between;align-items:center}
.td-day{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--blue)}
.td-focus{font-size:11px;color:var(--text-dim)}
.td-body{padding:12px 13px}
.td-step{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.td-step-n{font-family:'Space Mono',monospace;font-size:10px;color:var(--blue);min-width:22px;flex-shrink:0;padding-top:2px}
.td-step-t{font-size:13px;color:var(--text-dim);line-height:1.6}
.td-step-t strong{color:var(--text)}

.drill-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:6px}
.drill-name{font-size:12px;font-weight:600;color:var(--cyan);margin-bottom:3px}
.drill-desc{font-size:12px;color:var(--text-muted);line-height:1.5}

/* SESSION REGISTER */
.sf-group{margin-bottom:14px}
.sf-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:7px;display:block}

input,textarea,select{background:var(--bg2);border:1px solid var(--border);color:var(--text);
  border-radius:7px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:14px;width:100%;
  outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:70px;line-height:1.5}

.ctrs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ctr-wrap{text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px}
.ctr-lbl{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.ctr-val{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;color:var(--blue);
  line-height:1;margin-bottom:8px;display:block}
.ctr-val.red{color:var(--red)}
.ctr-btns{display:flex;gap:6px;justify-content:center}
.cbtn{width:38px;height:38px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);
  color:var(--text-dim);font-size:20px;line-height:1;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;
  -webkit-tap-highlight-color:transparent}
.cbtn:active{background:var(--blue-d);border-color:var(--blue)}

.res-btns,.partner-btns{display:flex;gap:6px;flex-wrap:wrap}
.rbtn,.pbtn{flex:1;min-width:80px;padding:9px 6px;border-radius:7px;border:1px solid var(--border);
  background:var(--bg2);color:var(--text-muted);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;text-align:center;
  -webkit-tap-highlight-color:transparent}
.rbtn.on,.pbtn.on{border-color:var(--orange);background:var(--orange-d);color:var(--orange)}
.rbtn:active,.pbtn:active{opacity:.7}

.stars{display:flex;gap:8px;margin-top:4px}
.star{font-size:28px;cursor:pointer;color:var(--text-muted);transition:all .15s;user-select:none;
  background:none;border:none;-webkit-tap-highlight-color:transparent}
.star.lit{color:var(--gold)}

.blind-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);
  border-radius:7px;padding:11px 12px;margin-bottom:12px;cursor:pointer}
.blind-row input{width:18px;height:18px;accent-color:var(--orange);cursor:pointer;flex-shrink:0}
.blind-lbl{font-size:13px;color:var(--text-dim);line-height:1.4;cursor:pointer}
.blind-lbl strong{color:var(--orange)}

.save-btn{width:100%;padding:13px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:4px;
  -webkit-tap-highlight-color:transparent}
.save-btn:active{opacity:.8}

/* SESSION HISTORY */
.shist-hdr{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-muted);margin:14px 0 8px}
.she{background:var(--bg2);border:1px solid var(--border);border-radius:7px;
  padding:9px 11px;margin-bottom:6px;display:flex;gap:9px;align-items:flex-start}
.she-date{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-muted);min-width:45px;padding-top:2px}
.she-body{flex:1;min-width:0}
.she-r1{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:2px}
.she-rate{font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
.she-stars{font-size:11px;color:var(--gold)}
.she-res,.she-par{font-size:10px;color:var(--text-muted)}
.she-blind{font-size:10px;color:var(--orange);margin-top:2px}
.she-note{font-size:11px;color:var(--text-muted);margin-top:3px;line-height:1.4}
.she-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:15px;
  padding:2px 4px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.she-del:active{color:var(--red)}

/* METRICS */
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.mbox{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px;text-align:center}
.mval{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;line-height:1}
.mlab{font-size:9px;color:var(--text-muted);margin-top:3px;letter-spacing:.5px;text-transform:uppercase}

.rbar-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px;margin-bottom:10px}
.rbar-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.rbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rbar-lbl{font-size:11px;color:var(--text-dim);min-width:55px}
.rbar-outer{flex:1;height:10px;background:var(--bg3);border-radius:3px;overflow:hidden}
.rbar-inner{height:100%;border-radius:3px;transition:width .5s ease}
.rbar-pct{font-family:'Space Mono',monospace;font-size:10px;min-width:32px;text-align:right}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.cal-cell{aspect-ratio:1;border-radius:3px;background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text-muted)}
.cal-cell.has{background:var(--blue-d);border-color:var(--blue);color:var(--blue)}
.cal-cell.blind{background:var(--gold-d);border-color:var(--gold);color:var(--gold)}

/* GATE */
.gcrit{display:flex;align-items:flex-start;gap:10px;background:var(--bg2);
  border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:7px;transition:all .3s}
.gcrit.met{border-color:var(--green);background:var(--green-d)}
.gcrit.fail{border-color:var(--red);background:var(--red-d)}
.gcrit-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.gcrit-body{flex:1}
.gcrit-name{font-size:13px;font-weight:600;margin-bottom:2px}
.gcrit.met .gcrit-name{color:var(--green)}
.gcrit-desc{font-size:11px;color:var(--text-muted);line-height:1.4}
.gcrit-cur{font-family:'Space Mono',monospace;font-size:10px;margin-top:4px}
.gcrit-cur.g{color:var(--green)}.gcrit-cur.w{color:var(--gold)}.gcrit-cur.r{color:var(--red)}

.gcheck{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;background:var(--bg2);
  border:1px solid var(--border);border-radius:7px;margin-bottom:5px;cursor:pointer;
  transition:all .2s;-webkit-tap-highlight-color:transparent}
.gcheck:active{opacity:.7}
.gcheck.on{background:var(--green-d);border-color:var(--green)}
.gcheck input{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;margin-top:1px}
.gcheck label{font-size:12px;color:var(--text-dim);cursor:pointer;line-height:1.5}
.gcheck.on label{color:var(--green)}

.gate-sum{background:var(--bg2);border-radius:10px;padding:14px;border:1px solid var(--border);margin-top:12px}
.gate-verdict{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;text-align:center;padding:10px 0 6px;letter-spacing:1px}
.gate-verdict.pass{color:var(--green)}.gate-verdict.fail{color:var(--red)}
.gate-verdict.close{color:var(--gold)}.gate-verdict.pending{color:var(--text-muted)}
.gate-hint{font-size:11px;color:var(--text-muted);text-align:center;margin-top:4px;line-height:1.6}

.adv-btn{width:100%;padding:13px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--green),#00a870);color:#000;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:10px}
.adv-btn:active{opacity:.8}
.adv-btn:disabled{opacity:.3;cursor:not-allowed}
.retry-btn{width:100%;padding:11px;border-radius:8px;border:1px solid var(--orange);
  background:var(--orange-d);color:var(--orange);font-family:'Syne',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  transition:all .2s;margin-top:8px}
.retry-btn:active{opacity:.7}

/* SIDE QUESTS */
.sq{background:var(--bg2);border:1px solid var(--border);border-radius:9px;
  margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.sq.done{border-color:var(--purple)}
.sq-hdr{padding:12px 13px;display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;user-select:none;transition:background .2s;-webkit-user-select:none}
.sq-hdr:active{background:var(--bg3)}
.sq-hl{flex:1;min-width:0}
.sq-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sq-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.sq-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px;
  text-transform:uppercase;border:1px solid var(--purple);color:var(--purple);
  background:var(--purple-d);white-space:nowrap;flex-shrink:0;margin-left:8px}
.sq-badge.done{background:rgba(176,96,255,.35)}
.sq-body{display:none;padding:13px;border-top:1px solid var(--border)}
.sq-body.open{display:block}
.sq-note{margin-top:8px}
.sq-save{margin-top:6px;padding:7px 14px;border-radius:6px;border:1px solid var(--purple);
  background:var(--purple-d);color:var(--purple);font-size:11px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif}
.sq-complete{width:100%;padding:10px;border-radius:7px;border:none;
  background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;margin-top:8px}
.sq-complete:disabled{opacity:.4;cursor:not-allowed}

/* MODAL */
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;
  align-items:center;justify-content:center;padding:20px}
.moverlay.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--border2);border-radius:14px;
  padding:24px 20px;max-width:430px;width:100%;
  animation:mpop .2s cubic-bezier(.4,0,.2,1)}
@keyframes mpop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.modal h2{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;margin-bottom:8px}
.modal p{color:var(--text-dim);font-size:13px;line-height:1.7;margin-bottom:16px}
.mbtns{display:flex;gap:8px}
.mb-ok{flex:1;padding:11px;border-radius:8px;border:none;background:var(--green);color:#000;
  font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.mb-cancel{flex:1;padding:11px;border-radius:8px;border:1px solid var(--border2);background:transparent;
  color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg3);border:1px solid var(--green);border-radius:8px;padding:10px 18px;
  font-size:13px;color:var(--green);font-weight:600;z-index:2000;
  transition:transform .3s ease;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

// STATE & STORAGE
// ═══════════════════════════════════
let pendingAdv = null;

const ls = (k,d) => { try{const v=localStorage.getItem('bjjp2_'+k);return v!==null?JSON.parse(v):d}catch{return d} };
const lss = (k,v) => { try{localStorage.setItem('bjjp2_'+k,JSON.stringify(v))}catch{} };

const getState = id => ls('s_'+id,{status:'locked'});
const setState = (id,s) => lss('s_'+id,s);
const getSessions = id => ls('ses_'+id,[]);
const saveSessions = (id,a) => lss('ses_'+id,a);
const getChecks = id => ls('chk_'+id,[]);
const saveChecks = (id,a) => lss('chk_'+id,a);
const getSQ = id => ls('sq_'+id,{done:false,note:'',checks:[]});
const saveSQ = (id,v) => lss('sq_'+id,v);
const getForm = id => ls('sf_'+id,{att:0,suc:0,stars:0,res:'',par:'',note:'',blind:false});
const saveForm = (id,v) => lss('sf_'+id,v);

// ═══════════════════════════════════
// METRICS
// ═══════════════════════════════════
function metrics(nid){
  const ses=getSessions(nid);
  if(!ses.length)return{total:0,att:0,suc:0,rate:0,avgS:0,byR:{},blind:0,rec:0};
  const att=ses.reduce((s,x)=>s+(x.att||0),0);
  const suc=ses.reduce((s,x)=>s+(x.suc||0),0);
  const rate=att>0?Math.round(suc/att*100):0;
  const avgS=Math.round(ses.reduce((s,x)=>s+(x.stars||0),0)/ses.length*10)/10;
  const blind=ses.filter(x=>x.blind&&x.suc>0).length;
  const l5=ses.slice(0,5);const l5a=l5.reduce((s,x)=>s+(x.att||0),0);const l5s=l5.reduce((s,x)=>s+(x.suc||0),0);
  const rec=l5a>0?Math.round(l5s/l5a*100):0;
  const byR={};['leve','media','maxima'].forEach(r=>{
    const rx=ses.filter(x=>x.res===r);const ra=rx.reduce((s,x)=>s+(x.att||0),0);const rs=rx.reduce((s,x)=>s+(x.suc||0),0);
    byR[r]={att:ra,suc:rs,rate:ra>0?Math.round(rs/ra*100):0};
  });
  return{total:ses.length,att,suc,rate,avgS,byR,blind,rec};
}

function evalGate(node,m,checks){
  const r=m.rate>=node.criteria.minRate;
  const a=m.att>=node.criteria.minAttempts;
  const c=checks.filter(Boolean).length===node.criteria.checks.length;
  return{rateMet:r,attMet:a,checksMet:c,canAdv:r&&a&&c,partial:(r&&a)||c};
}

// ═══════════════════════════════════
// RENDER — OVERALL
// ═══════════════════════════════════
function getStatuses(){
  const st=NODES.map(n=>getState(n.id).status);
  // Ensure first non-mastered/done after last completed is active
  let lastDone=-1;
  st.forEach((s,i)=>{if(s==='mastered'||s==='done')lastDone=i;});
  const statuses=NODES.map((n,i)=>{
    const s=getState(n.id).status;
    if(s==='mastered'||s==='done')return s;
    if(i===0)return 'active';
    const prev=st[i-1];
    if(prev==='mastered'||prev==='done'){
      // Check if this is the immediate next
      let isNext=true;
      for(let j=i+1;j<NODES.length;j++){if(st[j]==='mastered'||st[j]==='done'){isNext=false;break;}}
      if(st.slice(0,i).every(s2=>s2==='mastered'||s2==='done'))return 'active';
    }
    return 'locked';
  });
  return statuses;
}

function renderOverall(){
  const statuses=getStatuses();
  const done=statuses.filter(s=>s==='mastered'||s==='done').length;
  const pct=Math.round(done/NODES.length*100);
  document.getElementById('ovr-pct').textContent=pct+'%';
  document.getElementById('ovr-fill').style.width=pct+'%';
  document.getElementById('ovr-nodes').innerHTML=statuses.map(s=>`<div class="ovr-node ${s==='mastered'||s==='done'?'done':s==='active'?'active':'locked'}"></div>`).join('');
  const pills=document.getElementById('hdr-pills');
  const activeIdx=statuses.findIndex(s=>s==='active');
  pills.innerHTML=`
    <div class="pill"><div class="pill-dot" style="background:var(--green)"></div>${done}/${NODES.length} dominados</div>
    <div class="pill"><div class="pill-dot" style="background:var(--blue)"></div>Nível ${activeIdx>=0?NODES[activeIdx].step:'?'} ativo</div>
    <div class="pill"><div class="pill-dot" style="background:var(--gold)"></div>${pct}% completo</div>`;
  if(activeIdx>=0){
    const n=NODES[activeIdx];
    document.getElementById('fc-title').textContent=n.name;
    document.getElementById('fc-sub').textContent=`Passo ${n.step} · ${n.tags[0]}`;
  }
}

function renderAll(){
  renderOverall();
  const statuses=getStatuses();
  const path=document.getElementById('path');
  path.innerHTML='';
  NODES.forEach((node,i)=>path.appendChild(buildNode(node,statuses[i])));
}

function buildNode(node,status){
  const div=document.createElement('div');
  div.className=`node ${status}-node`;
  div.id='nd-'+node.id;
  const sbMap={locked:'<span class="nsbadge nsb-locked">🔒</span>',active:'<span class="nsbadge nsb-active">▶ ATIVO</span>',done:'<span class="nsbadge nsb-done">✓ OK</span>',mastered:'<span class="nsbadge nsb-mastered">★ DOM</span>'};
  const m=metrics(node.id);
  const dots=Array.from({length:5},(_,i)=>`<div class="ndot ${i<Math.min(Math.round(m.att/node.criteria.minAttempts*5),5)?(status==='mastered'?'g':'f'):''}"></div>`).join('');
  const tags=node.tags.map((t,i)=>`<span class="tag ${node.tagTypes[i]}">${t}</span>`).join('');
  div.innerHTML=`
    <div class="nwrap">
      <div class="nicon ${status}">${node.emoji}</div>
      <div class="ncard ${status}">
        <div class="nhdr" onclick="toggleNode('${node.id}')">
          <div class="nhl">
            <div class="nstep">PASSO ${String(node.step).padStart(2,'0')}</div>
            <div class="nname">${node.name}</div>
            <div class="ntags">${tags}</div>
          </div>
          <div class="nhr">${sbMap[status]||''}<div class="ndots">${dots}</div></div>
        </div>
        <div class="nbody" id="nb-${node.id}">
          <div class="ntabs">
            <div class="ntab active" onclick="switchTab('${node.id}','guide')">📖 Guia</div>
            <div class="ntab" onclick="switchTab('${node.id}','train')">🏋️ Treinar</div>
            <div class="ntab" onclick="switchTab('${node.id}','session')">📝 Registrar</div>
            <div class="ntab" onclick="switchTab('${node.id}','metrics')">📊 Métricas</div>
            <div class="ntab" onclick="switchTab('${node.id}','gate')">🎯 Gate</div>
            <div class="ntab" onclick="switchTab('${node.id}','sq')">⭐ Quests</div>
          </div>
          <div class="ntc active" id="tc-guide-${node.id}">${buildGuide(node)}</div>
          <div class="ntc" id="tc-train-${node.id}">${buildTrain(node)}</div>
          <div class="ntc" id="tc-session-${node.id}">${buildSession(node)}</div>
          <div class="ntc" id="tc-metrics-${node.id}"></div>
          <div class="ntc" id="tc-gate-${node.id}"></div>
          <div class="ntc" id="tc-sq-${node.id}">${buildSQ(node)}</div>
        </div>
      </div>
    </div>`;
  return div;
}

function buildGuide(node){
  const steps=node.steps.map(s=>`<div class="gstep"><span class="gstep-n">${s.n}</span><span class="gstep-t">${s.t}</span></div>`).join('');
  const ifthen=node.ifthen.map(r=>`<div class="ifthen"><div class="it-if">SE → <span>${r.if}</span></div><div class="it-then">ENTÃO → <span>${r.then}</span></div></div>`).join('');
  const yts=node.ytLinks.map(y=>`<a class="yt-link" href="${y.url}" target="_blank" rel="noopener"><div class="yt-icon">▶️</div><div class="yt-body"><div class="yt-title">${y.title}</div><div class="yt-sub">${y.sub}</div></div></a>`).join('');
  return `
    <div class="g-context"><strong>💡 Contexto</strong>${node.context}</div>
    <div class="sec-title">Passo a Passo Detalhado</div>
    ${steps}
    <div class="sec-title">Detalhe Chave</div>
    <div class="detail-box db-green"><strong>⚙️ O que faz funcionar</strong>${node.keyDetail}</div>
    <div class="detail-box db-red"><strong>⚠️ Erro mais comum</strong>${node.error}</div>
    <div class="detail-box db-orange"><strong>🔙 Caminho para as Costas / Finalização</strong>${node.backPath}</div>
    <div class="sec-title">Sistema IF/THEN</div>
    ${ifthen}
    <div class="sec-title">▶ Referências YouTube</div>
    ${yts}`;
}

function buildTrain(node){
  const days=node.trainPlan.map(d=>`
    <div class="train-day">
      <div class="td-header"><span class="td-day">${d.day}</span><span class="td-focus">${d.focus}</span></div>
      <div class="td-body">
        ${d.steps.map(s=>`<div class="td-step"><span class="td-step-n">${s.n}</span><span class="td-step-t">${s.t}</span></div>`).join('')}
      </div>
    </div>`).join('');
  return `
    <div class="detail-box db-blue"><strong>🎯 Como usar esta aba</strong>Estes são planos concretos para aplicar a técnica nos seus treinos. Leia antes do treino e volte depois para registrar.</div>
    ${days}
    <div class="detail-box db-purple"><strong>💡 Regra de Ouro</strong>Entre em cada treino com APENAS 1 objetivo específico deste nó. Um objetivo claro = feedback claro = evolução rápida.</div>`;
}

function buildSession(node){
  const f=getForm(node.id);
  const sess=getSessions(node.id);
  const histHtml=sess.length===0?'<div style="text-align:center;color:var(--text-muted);padding:14px;font-size:12px">Nenhuma sessão registrada.</div>':
    sess.slice(0,6).map(s=>{
      const rate=s.att>0?Math.round(s.suc/s.att*100):0;
      const rc=rate>=50?'var(--green)':rate>=30?'var(--gold)':'var(--red)';
      const rl={leve:'🟢',media:'🟡',maxima:'🔴'}[s.res]||'';
      return `<div class="she">
        <div class="she-date">${(s.date||'').slice(5)}</div>
        <div class="she-body">
          <div class="she-r1">
            <span class="she-rate" style="color:${rc}">${s.suc||0}/${s.att||0} (${rate}%)</span>
            <span class="she-stars">${'★'.repeat(s.stars||0)}</span>
            <span class="she-res">${rl}</span>
            <span class="she-par">${s.par||''}</span>
          </div>
          ${s.blind?'<div class="she-blind">⚡ Adversário sabia — funcionou mesmo assim</div>':''}
          ${s.note?`<div class="she-note">${s.note.slice(0,100)}${s.note.length>100?'...':''}</div>`:''}
        </div>
        <button class="she-del" onclick="delSes('${node.id}',${s.id})">🗑</button>
      </div>`;
    }).join('');

  return `
    <div class="ctrs">
      <div class="ctr-wrap">
        <div class="ctr-lbl">Tentativas</div>
        <span class="ctr-val" id="cv-att-${node.id}">${f.att||0}</span>
        <div class="ctr-btns">
          <button class="cbtn" onclick="ctr('${node.id}','att',-1)">−</button>
          <button class="cbtn" onclick="ctr('${node.id}','att',1)">+</button>
        </div>
      </div>
      <div class="ctr-wrap">
        <div class="ctr-lbl">Funcionou</div>
        <span class="ctr-val red" id="cv-suc-${node.id}">${f.suc||0}</span>
        <div class="ctr-btns">
          <button class="cbtn" onclick="ctr('${node.id}','suc',-1)">−</button>
          <button class="cbtn" onclick="ctr('${node.id}','suc',1)">+</button>
        </div>
      </div>
    </div>

    <div class="sf-group">
      <span class="sf-lbl">Resistência do Parceiro</span>
      <div class="res-btns">
        <div class="rbtn ${f.res==='leve'?'on':''}" onclick="setRes('${node.id}','leve',this)">🟢 Leve</div>
        <div class="rbtn ${f.res==='media'?'on':''}" onclick="setRes('${node.id}','media',this)">🟡 Média</div>
        <div class="rbtn ${f.res==='maxima'?'on':''}" onclick="setRes('${node.id}','maxima',this)">🔴 Máxima</div>
      </div>
    </div>

    <div class="sf-group">
      <span class="sf-lbl">Nível do Parceiro</span>
      <div class="partner-btns" id="pb-${node.id}">
        ${['Menos exp.','Mesmo nível','Mais exp.'].map(p=>`<div class="pbtn ${f.par===p?'on':''}" onclick="setPar('${node.id}','${p}',this)">${p}</div>`).join('')}
      </div>
    </div>

    <div class="sf-group">
      <span class="sf-lbl">Sensação (1-5★)</span>
      <div class="stars" id="stars-${node.id}">
        ${[1,2,3,4,5].map(n=>`<button class="star ${f.stars>=n?'lit':''}" onclick="setStars('${node.id}',${n})">★</button>`).join('')}
      </div>
    </div>

    <div class="blind-row" onclick="toggleBlind('${node.id}')">
      <input type="checkbox" id="blind-${node.id}" ${f.blind?'checked':''} onclick="event.stopPropagation()"/>
      <div class="blind-lbl">⚡ <strong>Adversário SABIA</strong> que eu ia tentar — funcionou mesmo assim</div>
    </div>

    <div class="sf-group">
      <span class="sf-lbl">Observação</span>
      <textarea id="snote-${node.id}" placeholder="O que funcionou / onde travou / detalhe para próximo treino...">${f.note||''}</textarea>
    </div>

    <button class="save-btn" onclick="saveSes('${node.id}')">💾 SALVAR SESSÃO</button>

    <div class="shist-hdr">Sessões registradas</div>
    <div id="shist-${node.id}">${histHtml}</div>`;
}

function buildMetrics(nid){
  const m=metrics(nid);const ses=getSessions(nid);
  const rc=m.rate>=50?'var(--green)':m.rate>=30?'var(--gold)':'var(--red)';
  const rrc=m.rec>=50?'var(--green)':m.rec>=30?'var(--gold)':'var(--red)';
  const today=new Date();
  const days=[...new Set(ses.map(x=>x.date))];
  const cal=Array.from({length:28},(_,i)=>{
    const d=new Date(today);d.setDate(d.getDate()-27+i);
    const k=d.toISOString().split('T')[0];
    const has=days.includes(k);
    const bl=ses.some(s=>s.date===k&&s.blind&&s.suc>0);
    return `<div class="cal-cell ${bl?'blind':has?'has':''}">${d.getDate()}</div>`;
  }).join('');
  const trend=ses.slice(0,10).reverse().map(s=>{
    const r=s.att>0?Math.round(s.suc/s.att*100):0;
    const c=r>=50?'var(--green)':r>=30?'var(--gold)':'var(--red)';
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="height:36px;display:flex;align-items:flex-end;width:100%;justify-content:center">
        <div style="width:70%;height:${Math.max(r*.36,2)}px;background:${c};border-radius:2px 2px 0 0"></div>
      </div>
      <div style="font-size:8px;color:var(--text-muted)">${r}%</div>
    </div>`;
  }).join('');
  return `
    <div class="mgrid">
      <div class="mbox"><div class="mval" style="color:${rc}">${m.rate}%</div><div class="mlab">Taxa Geral</div></div>
      <div class="mbox"><div class="mval" style="color:${rrc}">${m.rec}%</div><div class="mlab">Últimas 5</div></div>
      <div class="mbox"><div class="mval">${m.att}</div><div class="mlab">Tentativas</div></div>
      <div class="mbox"><div class="mval" style="color:var(--green)">${m.suc}</div><div class="mlab">Sucessos</div></div>
      <div class="mbox"><div class="mval" style="color:var(--gold)">${m.avgS}★</div><div class="mlab">Sensação</div></div>
      <div class="mbox"><div class="mval" style="color:var(--orange)">${m.blind}</div><div class="mlab">⚡ Blind</div></div>
    </div>
    <div class="rbar-wrap">
      <div class="rbar-title">Taxa por Nível de Resistência</div>
      ${['leve','media','maxima'].map(r=>{
        const d=m.byR[r]||{rate:0};
        const c=d.rate>=50?'var(--green)':d.rate>=30?'var(--gold)':'var(--red)';
        return `<div class="rbar-row">
          <span class="rbar-lbl">${{leve:'🟢 Leve',media:'🟡 Média',maxima:'🔴 Máx'}[r]}</span>
          <div class="rbar-outer"><div class="rbar-inner" style="width:${d.rate}%;background:${c}"></div></div>
          <span class="rbar-pct" style="color:${c}">${d.rate}%</span>
        </div>`;}).join('')}
    </div>
    ${ses.length>0?`<div style="margin-bottom:10px">
      <div class="rbar-title">Tendência</div>
      <div style="display:flex;gap:2px;height:52px;align-items:flex-end">${trend}</div>
    </div>`:''}
    <div class="rbar-title">Atividade (28 dias)</div>
    <div style="font-size:9px;color:var(--text-muted);margin-bottom:4px">🔵 sessão · 🟡 blind success</div>
    <div class="cal-grid">${cal}</div>`;
}

function buildGate(node){
  const m=metrics(node.id);const checks=getChecks(node.id);
  const g=evalGate(node,m,checks);
  const auto=[
    {name:`Taxa ≥ ${node.criteria.minRate}%`,desc:`Mínimo ${node.criteria.minRate}% de sucesso`,met:g.rateMet,cur:`${m.rate}% (precisa ${node.criteria.minRate}%)`,cls:g.rateMet?'g':m.rate>=node.criteria.minRate*.7?'w':'r'},
    {name:`≥ ${node.criteria.minAttempts} tentativas`,desc:`Mínimo ${node.criteria.minAttempts} tentativas registradas`,met:g.attMet,cur:`${m.att} (precisa ${node.criteria.minAttempts})`,cls:g.attMet?'g':m.att>=node.criteria.minAttempts*.7?'w':'r'}
  ];
  const autoH=auto.map(c=>`<div class="gcrit ${c.met?'met':'fail'}">
    <span class="gcrit-icon">${c.met?'✅':'⏳'}</span>
    <div class="gcrit-body"><div class="gcrit-name">${c.name}</div><div class="gcrit-desc">${c.desc}</div>
    <div class="gcrit-cur ${c.cls}">${c.cur}</div></div></div>`).join('');
  const manH=node.criteria.checks.map((c,i)=>`<div class="gcheck ${checks[i]?'on':''}" onclick="toggleCheck('${node.id}',${i})">
    <input type="checkbox" ${checks[i]?'checked':''} onclick="event.stopPropagation()"/>
    <label>${c}</label></div>`).join('');
  let v,vc;
  if(g.canAdv){v='🏆 PODE AVANÇAR';vc='pass';}
  else if(g.partial){v='⚡ QUASE LÁ';vc='close';}
  else if(m.att===0){v='⏳ REGISTRE SESSÕES';vc='pending';}
  else{v='🔄 CONTINUE TREINANDO';vc='fail';}
  const hint=`${!g.rateMet?`Falta ${node.criteria.minRate-m.rate}% na taxa. `:''}${!g.attMet?`Faltam ${node.criteria.minAttempts-m.att} tentativas. `:''}${!g.checksMet?`${node.criteria.checks.length-checks.filter(Boolean).length} critério(s) manual(is) pendente(s).`:''}`;
  return `
    <div class="sec-title">Critérios Automáticos</div>
    ${autoH}
    <div class="sec-title">Checklist Manual</div>
    ${manH}
    <div class="gate-sum">
      <div class="gate-verdict ${vc}">${v}</div>
      ${hint?`<div class="gate-hint">${hint}</div>`:''}
      ${g.canAdv?`<button class="adv-btn" onclick="openAdv('${node.id}')">AVANÇAR PARA O PRÓXIMO NÍVEL →</button>`:
        `<button class="retry-btn" onclick="goSession('${node.id}')">↺ REGISTRAR NOVA SESSÃO</button>`}
    </div>`;
}

function buildSQ(node){
  return node.sideQuests.map(sq=>{
    const st=getSQ(sq.id);
    return `<div class="sq ${st.done?'done':''}">
      <div class="sq-hdr" onclick="toggleSQ('${sq.id}')">
        <div class="sq-hl"><div class="sq-name">${sq.name}</div><div class="sq-sub">${sq.desc||sq.sub||''}</div></div>
        <span class="sq-badge ${st.done?'done':''}">${st.done?'✓ Feito':'Side Quest'}</span>
      </div>
      <div class="sq-body" id="sqb-${sq.id}">
        ${sq.steps.map((s,i)=>`<div class="gcheck ${st.checks&&st.checks[i]?'on':''}" onclick="toggleSQcheck('${sq.id}',${i})">
          <input type="checkbox" ${st.checks&&st.checks[i]?'checked':''} onclick="event.stopPropagation()"/>
          <label>${s}</label></div>`).join('')}
        <div class="sq-note">
          <label style="font-size:10px;color:var(--text-muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block">Anotação</label>
          <textarea id="sqn-${sq.id}" rows="2" placeholder="O que aprendeu...">${st.note||''}</textarea>
        </div>
        <button class="sq-save" onclick="saveSQnote('${sq.id}')">💾 Salvar</button>
        <button class="sq-complete" ${st.done?'disabled':''} onclick="completeSQ('${sq.id}')">${st.done?'✓ Concluído':'★ Marcar como Concluído'}</button>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════
function toggleNode(id){
  const b=document.getElementById('nb-'+id);
  if(!b)return;
  b.classList.toggle('open');
  if(b.classList.contains('open'))refreshLiveTabs(id);
}

function switchTab(id,tab){
  ['guide','train','session','metrics','gate','sq'].forEach(t=>{
    const tb=document.querySelector(`#nb-${id} .ntab:nth-child(${['guide','train','session','metrics','gate','sq'].indexOf(t)+1})`);
    const tc=document.getElementById(`tc-${t}-${id}`);
    if(tb)tb.classList.toggle('active',t===tab);
    if(tc)tc.classList.toggle('active',t===tab);
  });
  if(tab==='metrics'||tab==='gate')refreshLiveTabs(id);
}

function refreshLiveTabs(id){
  const node=NODES.find(n=>n.id===id);if(!node)return;
  const mt=document.getElementById(`tc-metrics-${id}`);
  const gt=document.getElementById(`tc-gate-${id}`);
  if(mt&&mt.classList.contains('active'))mt.innerHTML=buildMetrics(id);
  if(gt&&gt.classList.contains('active'))gt.innerHTML=buildGate(node);
  // Always refresh gate content when tabs are open
  if(mt&&!mt.innerHTML)mt.innerHTML=buildMetrics(id);
  if(gt&&!gt.innerHTML)gt.innerHTML=buildGate(node);
}

function ctr(id,field,delta){
  const el=document.getElementById(`cv-${field}-${id}`);if(!el)return;
  let v=parseInt(el.textContent)||0;v=Math.max(0,v+delta);el.textContent=v;
  const f=getForm(id);f[field]=v;saveForm(id,f);
}
function setRes(id,v,el){
  document.querySelectorAll(`#tc-session-${id} .rbtn`).forEach(b=>b.classList.remove('on'));
  el.classList.add('on');const f=getForm(id);f.res=v;saveForm(id,f);
}
function setPar(id,v,el){
  document.querySelectorAll(`#pb-${id} .pbtn`).forEach(b=>b.classList.remove('on'));
  el.classList.add('on');const f=getForm(id);f.par=v;saveForm(id,f);
}
function setStars(id,n){
  document.querySelectorAll(`#stars-${id} .star`).forEach((s,i)=>s.classList.toggle('lit',i<n));
  const f=getForm(id);f.stars=n;saveForm(id,f);
}
function toggleBlind(id){
  const cb=document.getElementById('blind-'+id);if(!cb)return;
  const f=getForm(id);f.blind=cb.checked;saveForm(id,f);
}

function saveSes(id){
  const f=getForm(id);
  const att=parseInt(document.getElementById(`cv-att-${id}`)?.textContent)||0;
  const suc=parseInt(document.getElementById(`cv-suc-${id}`)?.textContent)||0;
  const note=document.getElementById(`snote-${id}`)?.value||'';
  const blind=document.getElementById(`blind-${id}`)?.checked||false;
  const ses={id:Date.now(),date:new Date().toISOString().split('T')[0],att,suc,stars:f.stars||0,res:f.res||'',par:f.par||'',note,blind};
  const all=getSessions(id);all.unshift(ses);saveSessions(id,all);
  saveForm(id,{att:0,suc:0,stars:0,res:'',par:'',note:'',blind:false});
  // Reset UI
  const ae=document.getElementById(`cv-att-${id}`),se=document.getElementById(`cv-suc-${id}`);
  if(ae)ae.textContent='0';if(se)se.textContent='0';
  document.querySelectorAll(`#tc-session-${id} .rbtn`).forEach(b=>b.classList.remove('on'));
  document.querySelectorAll(`#pb-${id} .pbtn`).forEach(b=>b.classList.remove('on'));
  document.querySelectorAll(`#stars-${id} .star`).forEach(s=>s.classList.remove('lit'));
  const ne=document.getElementById(`snote-${id}`);if(ne)ne.value='';
  const be=document.getElementById(`blind-${id}`);if(be)be.checked=false;
  // Update history
  const hist=document.getElementById(`shist-${id}`);
  if(hist){
    const all2=getSessions(id);
    hist.innerHTML=all2.slice(0,6).map(s=>{
      const rate=s.att>0?Math.round(s.suc/s.att*100):0;
      const rc=rate>=50?'var(--green)':rate>=30?'var(--gold)':'var(--red)';
      const rl={leve:'🟢',media:'🟡',maxima:'🔴'}[s.res]||'';
      return `<div class="she"><div class="she-date">${(s.date||'').slice(5)}</div>
        <div class="she-body"><div class="she-r1"><span class="she-rate" style="color:${rc}">${s.suc||0}/${s.att||0} (${rate}%)</span>
        <span class="she-stars">${'★'.repeat(s.stars||0)}</span><span class="she-res">${rl}</span><span class="she-par">${s.par||''}</span></div>
        ${s.blind?'<div class="she-blind">⚡ Sabia — funcionou</div>':''}
        ${s.note?`<div class="she-note">${s.note.slice(0,100)}</div>`:''}</div>
        <button class="she-del" onclick="delSes('${id}',${s.id})">🗑</button></div>`;
    }).join('');
  }
  showToast('✓ Sessão salva!');
  renderOverall();
  refreshLiveTabs(id);
}

function delSes(id,sid){
  if(!confirm('Remover esta sessão?'))return;
  const all=getSessions(id).filter(s=>s.id!==sid);saveSessions(id,all);
  const hist=document.getElementById(`shist-${id}`);
  if(hist){
    if(!all.length){hist.innerHTML='<div style="text-align:center;color:var(--text-muted);padding:14px;font-size:12px">Nenhuma sessão.</div>';return;}
    hist.innerHTML=all.slice(0,6).map(s=>{
      const rate=s.att>0?Math.round(s.suc/s.att*100):0;
      const rc=rate>=50?'var(--green)':rate>=30?'var(--gold)':'var(--red)';
      return `<div class="she"><div class="she-date">${(s.date||'').slice(5)}</div>
        <div class="she-body"><div class="she-r1"><span class="she-rate" style="color:${rc}">${s.suc}/${s.att} (${rate}%)</span></div>
        ${s.note?`<div class="she-note">${s.note.slice(0,100)}</div>`:''}</div>
        <button class="she-del" onclick="delSes('${id}',${s.id})">🗑</button></div>`;
    }).join('');
  }
  renderOverall();refreshLiveTabs(id);
}

function toggleCheck(id,i){
  const checks=getChecks(id);
  while(checks.length<=i)checks.push(false);
  checks[i]=!checks[i];saveChecks(id,checks);
  const node=NODES.find(n=>n.id===id);
  const m=metrics(id);const g=evalGate(node,m,checks);
  const gt=document.getElementById(`tc-gate-${id}`);
  if(gt)gt.innerHTML=buildGate(node);
}

function toggleSQ(id){const b=document.getElementById('sqb-'+id);if(b)b.classList.toggle('open');}
function toggleSQcheck(id,i){
  const st=getSQ(id);if(!st.checks)st.checks=[];
  while(st.checks.length<=i)st.checks.push(false);
  st.checks[i]=!st.checks[i];saveSQ(id,st);
  const item=document.querySelector(`#sqb-${id} .gcheck:nth-child(${i+1})`);
  if(item){item.classList.toggle('on',st.checks[i]);const cb=item.querySelector('input');if(cb)cb.checked=st.checks[i];}
}
function saveSQnote(id){
  const st=getSQ(id);const n=document.getElementById('sqn-'+id);if(n)st.note=n.value;saveSQ(id,st);showToast('✓ Anotação salva');}
function completeSQ(id){
  const st=getSQ(id);const n=document.getElementById('sqn-'+id);if(n)st.note=n.value;st.done=true;saveSQ(id,st);
  const badge=document.querySelector(`#sqb-${id}`)?.previousElementSibling?.querySelector('.sq-badge');
  if(badge){badge.textContent='✓ Feito';badge.classList.add('done');}
  const item=document.querySelector(`#sqb-${id}`)?.closest('.sq');if(item)item.classList.add('done');
  const btn=document.querySelector(`#sqb-${id} .sq-complete`);if(btn){btn.textContent='✓ Concluído';btn.disabled=true;}
  showToast('⭐ Quest concluída!');
}

function goSession(id){switchTab(id,'session');const b=document.getElementById('nb-'+id);if(b&&!b.classList.contains('open'))b.classList.add('open');}

function openAdv(id){
  pendingAdv=id;const node=NODES.find(n=>n.id===id);
  document.getElementById('madv-txt').innerHTML=`Você atendeu todos os critérios para <strong>${node.name}</strong>. O próximo nível será desbloqueado.`;
  document.getElementById('madv').classList.add('open');
}
function closeMadv(){document.getElementById('madv').classList.remove('open');pendingAdv=null;}
function confirmAdv(){
  if(!pendingAdv)return;
  setState(pendingAdv,{status:'mastered'});
  const i=NODES.findIndex(n=>n.id===pendingAdv);
  if(i>=0&&i<NODES.length-1)setState(NODES[i+1].id,{status:'active'});
  closeMadv();renderAll();showToast('🏆 Nível dominado! Próximo desbloqueado.');
  setTimeout(()=>{const next=document.getElementById('nd-'+NODES[Math.min(i+1,NODES.length-1)].id);if(next)next.scrollIntoView({behavior:'smooth',block:'start'});},400);
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMadv();});

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  renderAll();
  checkDriveCallback();
  initDriveSync();
  renderSyncStatus();
});

// ═══════════════════════════════════════════
// BACKUP & SYNC SYSTEM
// ═══════════════════════════════════════════

function getAllData(){
  const d={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('bjjp2_'))d[k]=localStorage.getItem(k);
  }
  d['_exported']=new Date().toISOString();
  return d;
}

function downloadBackup(silent){
  try{
    const blob=new Blob([JSON.stringify(getAllData(),null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='bjj_backup_'+new Date().toISOString().split('T')[0]+'.json';
    a.click();URL.revokeObjectURL(url);
    lss('last_backup',new Date().toISOString());
    renderSyncStatus();
    if(!silent)showToast('💾 Backup salvo!');
  }catch(e){if(!silent)showToast('❌ Erro ao salvar backup');}
}

function importBackup(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      let count=0;
      Object.entries(data).forEach(([k,v])=>{if(k.startsWith('bjjp2_')){localStorage.setItem(k,v);count++;}});
      lss('last_import',new Date().toISOString());
      showToast('✅ '+count+' registros importados!');
      renderSyncStatus();
      setTimeout(()=>renderAll(),600);
    }catch(e){showToast('❌ Arquivo inválido');}
  };
  reader.readAsText(file);
}

// Drive
let driveToken=ls('drive_token','');
let driveFileId=ls('drive_file_id','');
let driveSyncing=false;

function initDriveSync(){
  if(driveToken)verifyDriveToken();
}

function verifyDriveToken(){
  fetch('https://www.googleapis.com/oauth2/v3/tokeninfo?access_token='+driveToken)
    .then(r=>r.json())
    .then(d=>{if(d.error){driveToken='';lss('drive_token','');}renderSyncStatus();})
    .catch(()=>{driveToken='';lss('drive_token','');renderSyncStatus();});
}

function checkDriveCallback(){
  const hash=window.location.hash;
  if(!hash.includes('access_token'))return;
  const params=new URLSearchParams(hash.slice(1));
  const token=params.get('access_token');
  if(token){
    driveToken=token;lss('drive_token',token);
    history.replaceState(null,'',window.location.pathname);
    showToast('✅ Google Drive conectado!');
    renderSyncStatus();
    syncToDrive();
  }
}

function startDriveAuth(){
  const clientId=prompt(
    'Para conectar o Google Drive, você precisa de um Client ID.\n\n'+
    'COMO OBTER GRÁTIS (3 min):\n'+
    '1. Acesse: console.cloud.google.com\n'+
    '2. Crie projeto → APIs & Services → Library → "Google Drive API" → Ativar\n'+
    '3. APIs & Services → Credentials → "+ Create Credentials" → OAuth 2.0 Client ID\n'+
    '4. Application type: Web Application\n'+
    '5. Authorized JavaScript origins: adicione o URL desta página\n'+
    '6. Copie o "Client ID" e cole aqui\n\n'+
    'Client ID:'
  );
  if(!clientId||!clientId.trim())return;
  lss('drive_client_id',clientId.trim());
  const redirectUri=window.location.href.split('?')[0].split('#')[0];
  const url='https://accounts.google.com/o/oauth2/v2/auth?'+
    'client_id='+encodeURIComponent(clientId.trim())+
    '&redirect_uri='+encodeURIComponent(redirectUri)+
    '&response_type=token'+
    '&scope=https://www.googleapis.com/auth/drive.file'+
    '&prompt=consent';
  window.location.href=url;
}

async function syncToDrive(){
  if(!driveToken){showToast('⚠️ Conecte o Drive primeiro');return;}
  if(driveSyncing)return;
  driveSyncing=true;
  const btn=document.getElementById('btn-dsync');
  if(btn){btn.textContent='⏳ Sincronizando...';btn.disabled=true;}
  try{
    const blob=new Blob([JSON.stringify(getAllData(),null,2)],{type:'application/json'});
    let res;
    if(driveFileId){
      res=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+driveFileId+'?uploadType=media',{
        method:'PATCH',
        headers:{'Authorization':'Bearer '+driveToken,'Content-Type':'application/json'},
        body:blob
      });
    }else{
      const meta={name:'bjj_path_backup.json',mimeType:'application/json'};
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
      form.append('file',blob);
      res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
        method:'POST',headers:{'Authorization':'Bearer '+driveToken},body:form
      });
    }
    if(res.status===401){driveToken='';lss('drive_token','');showToast('⚠️ Token expirado — reconecte');renderSyncStatus();return;}
    const json=await res.json();
    if(json.id){driveFileId=json.id;lss('drive_file_id',json.id);}
    lss('last_drive_sync',new Date().toISOString());
    showToast('☁️ Salvo no Google Drive!');
    renderSyncStatus();
  }catch(e){showToast('❌ Erro no Drive: '+e.message);}
  finally{
    driveSyncing=false;
    if(btn){btn.textContent='☁️ Sync agora';btn.disabled=false;}
  }
}

async function restoreFromDrive(){
  if(!driveToken){showToast('⚠️ Conecte o Drive primeiro');return;}
  if(!driveFileId){showToast('⚠️ Nenhum arquivo encontrado');return;}
  if(!confirm('Substituir dados locais pelos dados do Drive?'))return;
  try{
    const res=await fetch('https://www.googleapis.com/drive/v3/files/'+driveFileId+'?alt=media',{headers:{'Authorization':'Bearer '+driveToken}});
    if(!res.ok)throw new Error('Arquivo não encontrado no Drive');
    const data=await res.json();
    let count=0;
    Object.entries(data).forEach(([k,v])=>{if(k.startsWith('bjjp2_')){localStorage.setItem(k,v);count++;}});
    showToast('✅ Restaurado! ('+count+' registros)');
    lss('last_import',new Date().toISOString());
    renderSyncStatus();
    setTimeout(()=>renderAll(),600);
  }catch(e){showToast('❌ Erro: '+e.message);}
}

function disconnectDrive(){
  if(!confirm('Desconectar Google Drive?'))return;
  driveToken='';driveFileId='';
  lss('drive_token','');lss('drive_file_id','');
  renderSyncStatus();refreshSyncPanel();
  showToast('Drive desconectado');
}

function fmtDate(iso){
  if(!iso)return 'nunca';
  try{
    const d=new Date(iso),now=new Date(),diff=Math.round((now-d)/60000);
    if(diff<1)return 'agora';
    if(diff<60)return diff+'min atrás';
    if(diff<1440)return Math.round(diff/60)+'h atrás';
    return d.toLocaleDateString('pt-BR');
  }catch{return '—';}
}

function renderSyncStatus(){
  const bar=document.getElementById('sync-status-bar');if(!bar)return;
  const lastB=ls('last_backup','');const lastD=ls('last_drive_sync','');
  const conn=!!driveToken;
  bar.innerHTML=`
    <button onclick="toggleSyncPanel()" style="display:flex;align-items:center;gap:7px;padding:7px 12px;
      background:var(--bg2);border:1px solid var(--border);border-radius:20px;cursor:pointer;
      font-family:'DM Sans',sans-serif;color:var(--text-dim);font-size:12px;transition:all .2s;"
      onmouseover="this.style.borderColor='var(--blue)'" onmouseout="this.style.borderColor='var(--border)'">
      <span>${conn?'☁️':'💾'}</span>
      <span>${conn?'Drive: '+fmtDate(lastD):'Backup: '+fmtDate(lastB)}</span>
      <span style="font-size:9px;color:var(--text-muted)">▾</span>
    </button>`;
}

function toggleSyncPanel(){
  let p=document.getElementById('sync-panel');
  if(!p){
    p=document.createElement('div');
    p.id='sync-panel';
    p.style.cssText='position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-top:1px solid var(--border2);'+
      'z-index:500;padding:20px 16px 30px;max-width:780px;margin:0 auto;border-radius:14px 14px 0 0;'+
      'transform:translateY(100%);transition:transform .3s ease;left:50%;transform:translateX(-50%) translateY(100%);width:100%;';
    p.innerHTML='<div id="sync-panel-body"></div>';
    document.body.appendChild(p);
    setTimeout(()=>{p.style.transform='translateX(-50%) translateY(0)';},10);
  }else{
    const isOpen=p.style.transform.includes('translateY(0)');
    if(isOpen){p.style.transform='translateX(-50%) translateY(100%)';}
    else{p.style.transform='translateX(-50%) translateY(0)';}
  }
  refreshSyncPanel();
}

function closeSyncPanel(){
  const p=document.getElementById('sync-panel');
  if(p)p.style.transform='translateX(-50%) translateY(100%)';
}

function refreshSyncPanel(){
  const body=document.getElementById('sync-panel-body');if(!body)return;
  const lastB=ls('last_backup','');const lastD=ls('last_drive_sync','');
  const conn=!!driveToken;
  const count=Object.keys(getAllData()).filter(k=>k.startsWith('bjjp2_')).length;
  body.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700">💾 Backup & Sincronização</span>
      <button onclick="closeSyncPanel()" style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:0 4px">✕</button>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">${count} registros salvos localmente</div>

    <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px">💾 BACKUP LOCAL (JSON)</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">Último backup: <span style="color:var(--text-dim)">${fmtDate(lastB)}</span></div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button onclick="downloadBackup(false)" style="flex:1;padding:10px;border-radius:7px;border:1px solid var(--green);background:var(--green-d);color:var(--green);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer">⬇ Baixar JSON</button>
      <button onclick="document.getElementById('imp-file').click()" style="flex:1;padding:10px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer">⬆ Importar JSON</button>
    </div>
    <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importBackup(this.files[0])"/>

    <div style="border-top:1px solid var(--border);padding-top:14px">
      <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px">☁️ GOOGLE DRIVE (AUTOMÁTICO)</div>
      ${conn?`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--green)"></div>
          <span style="font-size:12px;color:var(--green);font-weight:600">Conectado</span>
        </div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">Último sync: <span style="color:var(--text-dim)">${fmtDate(lastD)}</span></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
          <button id="btn-dsync" onclick="syncToDrive()" style="flex:1;padding:10px;border-radius:7px;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer">☁️ Sync agora</button>
          <button onclick="restoreFromDrive()" style="flex:1;padding:10px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer">⬇ Restaurar</button>
        </div>
        <button onclick="disconnectDrive()" style="width:100%;padding:8px;border-radius:7px;border:1px solid var(--red);background:var(--red-d);color:var(--red);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer">Desconectar Drive</button>
      `:`
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;line-height:1.6">
          Sincronize automaticamente entre celular e computador. Seus dados ficam salvos no seu próprio Google Drive.
        </div>
        <button onclick="startDriveAuth()" style="width:100%;padding:12px;border-radius:7px;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:1px;cursor:pointer">🔗 Conectar Google Drive</button>
        <div style="font-size:10px;color:var(--text-muted);margin-top:8px;text-align:center;line-height:1.6">Salva em bjj_path_backup.json no seu Drive pessoal</div>
      `}
    </div>`;
}

// Hook: auto-sync to Drive after session save
const _origSaveSes=saveSes;
saveSes=function(id){
  _origSaveSes(id);
  setTimeout(()=>{
    lss('pending_backup',true);
    if(driveToken&&!driveSyncing)syncToDrive().catch(()=>{});
    renderSyncStatus();
  },800);
};
</script>
